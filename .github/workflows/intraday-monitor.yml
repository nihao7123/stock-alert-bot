name: intraday-monitor

on:
  schedule:
    # UTC 0-8 = JST 9:00-17:59（收盘15:30，多留缓冲，吸收 GitHub 定时任务的延迟）
    - cron: '*/5 0-8 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: run intraday monitor
        env:
          FTQQ_SENDKEY: ${{ secrets.FTQQ_SENDKEY }}
        run: python kioxia_monitor.py
